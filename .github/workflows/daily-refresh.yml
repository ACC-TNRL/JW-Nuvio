name: Daily Refresh JustWatch NL

on:
  schedule:
    # Elke dag om 06:00 UTC (08:00 NL tijd)
    - cron: "0 6 * * *"
  workflow_dispatch: # Handmatig triggeren
  push:
    paths:
      - "scripts/scrape-jw.js" # Herdraaien als scraper verandert
      - "scripts/scrape-fv.js"
      - "scripts/build-addons.js"

jobs:
  refresh:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Scrape JustWatch NL & update cache
        env:
          JUSTWATCH_COUNTRY: "NL"
          JUSTWATCH_LANGUAGE: ${{ vars.JUSTWATCH_LANGUAGE || 'nl' }}
          CATALOG_LIMIT: ${{ vars.CATALOG_LIMIT || '50' }}
          ERDB_TOKEN: ${{ secrets.ERDB_TOKEN || '' }}
          ERDB_BASE_URL: ${{ vars.ERDB_BASE_URL || 'https://easyratingsdb.com' }}
        run: JUSTWATCH_COUNTRY=NL npm run refresh

      - name: Scrape JustWatch US & update cache
        env:
          JUSTWATCH_LANGUAGE: "en"
          CATALOG_LIMIT: ${{ vars.CATALOG_LIMIT || '50' }}
          ERDB_TOKEN: ${{ secrets.ERDB_TOKEN || '' }}
          ERDB_BASE_URL: ${{ vars.ERDB_BASE_URL || 'https://easyratingsdb.com' }}
        run: JUSTWATCH_COUNTRY=US npm run refresh

      - name: Scrape FilmVandaag & update cache
        env:
          ERDB_TOKEN: ${{ secrets.ERDB_TOKEN || '' }}
          ERDB_BASE_URL: ${{ vars.ERDB_BASE_URL || 'https://easyratingsdb.com' }}
        run: npm run refresh-fv

      - name: Build addon subdirectories from cache
        run: npm run build

      - name: Commit & push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add cache/ catalog/ manifest.json \
            nl/ nl-monthly/ nl-weekly/ \
            us/ us-monthly/ us-weekly/ \
            fv/ index.html landing.html
          if git diff --staged --quiet; then
            echo "No changes to cache"
          else
            git commit -m "chore: daily cache refresh [skip ci]"
            git push
          fi
